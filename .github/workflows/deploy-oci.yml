name: Deploy to OCI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy on OCI VM over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -euo pipefail

            cd /home/ubuntu/tienda_ropa

            git fetch --prune origin main
            git checkout main
            git pull --ff-only origin main

            if [ ! -d .venv ]; then
              python3 -m venv .venv
            fi

            source .venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            set -a
            source /home/ubuntu/.env.tienda
            set +a

            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            sudo systemctl restart tienda-gunicorn
            sudo systemctl reload nginx

            # Espera activa para evitar falsos 502 durante el arranque.
            ATTEMPTS=30
            SLEEP_SECONDS=2
            for i in $(seq 1 "$ATTEMPTS"); do
              if curl -fsSI http://127.0.0.1/login/ >/dev/null; then
                echo "Deploy OK"
                exit 0
              fi
              echo "Healthcheck intento $i/$ATTEMPTS..."
              sleep "$SLEEP_SECONDS"
            done

            echo "Healthcheck falló luego de $ATTEMPTS intentos."
            sudo systemctl status tienda-gunicorn --no-pager || true
            sudo systemctl status nginx --no-pager || true
            exit 1
